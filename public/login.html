<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Chronicle</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">Chronicle</div>
    <h2>Welcome back</h2>
    <p class="auth-subtitle">Sign in to your account to continue.</p>

    <!-- Alert box — shown on error -->
    <div id="alert-box"></div>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        placeholder="you@example.com"
        autocomplete="email"
        required
      />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        placeholder="Your password"
        autocomplete="current-password"
        required
      />
    </div>

    <button class="btn btn-primary" id="login-btn">
      Sign In
    </button>

    <div class="auth-link">
      Don't have an account? <a href="/register.html">Register</a>
    </div>
  </div>

  <!-- auth.js provides: redirectIfLoggedIn, saveAuthData, showAlert -->
  <script src="/auth.js"></script>
  <script>
    // If user is already logged in, redirect to feed
    redirectIfLoggedIn();

    const alertBox = document.getElementById("alert-box");
    const btn = document.getElementById("login-btn");

    btn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        return showAlert(alertBox, "Please enter your email and password.");
      }

      btn.textContent = "Signing in…";
      btn.disabled = true;

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          showAlert(alertBox, data.message || "Login failed.");
        } else {
          // Save token and user data, then go to the feed
          saveAuthData(data);
          window.location.href = "/index.html";
        }
      } catch (err) {
        showAlert(alertBox, "Network error. Please try again.");
      } finally {
        btn.textContent = "Sign In";
        btn.disabled = false;
      }
    });

    // Enter key submits the form
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") btn.click();
    });
  </script>
</body>
</html>
